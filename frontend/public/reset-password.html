<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - TaskKeeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background-color: rgba(26, 35, 50, 0.8);
            border: 1px solid #2a3a4a;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #2a3a4a;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
            background-color: #1a2332;
            color: #fff;
        }

        input:focus {
            outline: none;
            border-color: #0896ee;
            box-shadow: 0 0 0 3px rgba(8, 150, 238, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0896ee;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #0682d6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(8, 150, 238, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }

        .form-footer a {
            color: #0896ee;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background-color: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .alert.success {
            background-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password below</p>

        <div id="alert" class="alert"></div>

        <div id="loading" class="loading">Verifying your reset link...</div>

        <form id="resetPasswordForm" style="display: none;">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input
                    type="password"
                    id="newPassword"
                    name="newPassword"
                    placeholder="Enter new password"
                    required
                    minlength="6"
                >
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Confirm new password"
                    required
                    minlength="6"
                >
            </div>

            <button type="submit">Reset Password</button>
        </form>

        <div class="form-footer">
            <p><a href="login.html">Back to Sign In</a></p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const alertDiv = document.getElementById('alert');
        const loadingDiv = document.getElementById('loading');
        const form = document.getElementById('resetPasswordForm');

        // Verify the token on page load
        window.addEventListener('load', async () => {
            if (!token) {
                loadingDiv.style.display = 'none';
                showAlert('Invalid reset link. Please request a new one.', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/auth/verify-reset-token?token=${encodeURIComponent(token)}`);
                const data = await response.json();

                loadingDiv.style.display = 'none';

                if (response.ok) {
                    form.style.display = 'block';
                } else {
                    showAlert(data.message || 'Invalid or expired reset link.', 'error');
                }
            } catch (error) {
                loadingDiv.style.display = 'none';
                showAlert('Error verifying reset link. Please try again.', 'error');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword, confirmPassword }),
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Password reset successfully! Redirecting to login...', 'success');
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Failed to reset password', 'error');
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'error');
            }
        });

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
        }
    </script>
</body>
</html>
