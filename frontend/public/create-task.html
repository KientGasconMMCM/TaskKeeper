<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task - TaskKeeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .navbar {
            background-color: rgba(26, 35, 50, 0.8);
            border: 1px solid #2a3a4a;
            padding: 15px 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: #fff;
            font-size: 20px;
        }

        .nav-links a {
            color: #0aabff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 700;
            border-bottom: 2px solid transparent;
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: #3dc2ff;
            border-bottom-color: #3dc2ff;
        }

        .logout-btn {
            background: #0896ee;
            color: white;
            border: 2px solid #0896ee;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .logout-btn:hover {
            background: #0aabff;
            border-color: #0aabff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(8, 150, 238, 0.3);
        }

        .container {
            background-color: rgba(26, 35, 50, 0.8);
            border: 1px solid #2a3a4a;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #2a3a4a;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
            background-color: #1a2332;
            color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #0aabff;
            box-shadow: 0 0 0 3px rgba(8, 150, 238, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .submit-btn {
            background-color: #0896ee;
            color: white;
            border: 2px solid #0896ee;
        }

        .submit-btn:hover {
            background-color: #0aabff;
            border-color: #0aabff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(8, 150, 238, 0.4);
        }

        .cancel-btn {
            background: #2a3a4a;
            color: #ccc;
            border: 2px solid #3a4a5a;
        }

        .cancel-btn:hover {
            background: #3a4a5a;
            border-color: #4a5a6a;
            transform: translateY(-1px);
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background-color: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .alert.success {
            background-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px;
            }

            .navbar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>TaskKeeper</h2>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <h1>Create New Task</h1>
        <div id="alert" class="alert"></div>
        
        <form id="createTaskForm">
            <div class="form-group">
                <label for="title">Task Title *</label>
                <input 
                    type="text" 
                    id="title" 
                    name="title" 
                    placeholder="Enter task title" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea 
                    id="description" 
                    name="description" 
                    placeholder="Enter task description (optional)"
                ></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dueDate">Due Date</label>
                    <input 
                        type="date" 
                        id="dueDate" 
                        name="dueDate"
                    >
                </div>

                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="">None</option>
                    <option value="Game">Game</option>
                    <option value="School">School</option>
                    <option value="Work">Work</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="submit-btn">Create Task</button>
                <button type="button" class="cancel-btn" onclick="window.location.href='dashboard.html'">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        // Check if user is logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
            }
        });

        const createTaskForm = document.getElementById('createTaskForm');
        const alertDiv = document.getElementById('alert');

        createTaskForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const taskName = document.getElementById('title').value.trim();
            const taskDescription = document.getElementById('description').value;
            const deadline = document.getElementById('dueDate').value;
            const priority = document.getElementById('priority').value;
            const category = document.getElementById('category').value;

            if (!deadline) {
                showAlert('Please set a deadline for your task.', 'error');
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (new Date(deadline) < today) {
                showAlert('You cannot set a deadline in the past. Please choose a future date.', 'error');
                return;
            }

            if (!category) {
                showAlert('Please select a category for your task.', 'error');
                return;
            }

            // Check for duplicate task title
            try {
                const tasksRes = await fetch('/api/tasks', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                });
                if (tasksRes.ok) {
                    const tasksData = await tasksRes.json();
                    const duplicate = (tasksData.tasks || []).some(
                        t => t.task_name.toLowerCase() === taskName.toLowerCase()
                    );
                    if (duplicate) {
                        showAlert('A task with this title already exists. Please use a different title.', 'error');
                        return;
                    }
                }
            } catch (err) {
                console.error('Error checking duplicates:', err);
            }

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    },
                    body: JSON.stringify({
                        taskName,
                        taskDescription,
                        deadline,
                        priority,
                        category,
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Task created successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showAlert(data.message || 'Failed to create task', 'error');
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'error');
                console.error('Error:', error);
            }
        });

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
