<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskKeeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%);
            color: #fff;
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(26, 35, 50, 0.8);
            border-bottom: 1px solid #2a3a4a;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 24px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a, .logout-btn {
            color: white;
            text-decoration: none;
            font-weight: 500;
            background: rgba(8, 150, 238, 0.2);
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .nav-links a:hover, .logout-btn:hover {
            background: rgba(8, 150, 238, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h2 {
            font-size: 28px;
            color: #fff;
        }

        .create-btn {
            background-color: #0896ee;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .create-btn:hover {
            background-color: #0682d6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(8, 150, 238, 0.3);
        }

        .filters {
            background-color: rgba(26, 35, 50, 0.8);
            border: 1px solid #2a3a4a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 500;
            color: #ccc;
        }

        .filter-group select {
            padding: 8px 12px;
            border: 1px solid #2a3a4a;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background-color: #1a2332;
            color: #fff;
        }

        .tasks-container {
            background-color: rgba(26, 35, 50, 0.8);
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            overflow: hidden;
        }

        .task-item {
            padding: 20px;
            border-bottom: 1px solid #2a3a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .task-item:hover {
            background: rgba(42, 58, 74, 0.5);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #fff;
        }

        .task-description {
            color: #999;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #999;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
        }

        .badge.priority-high {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .badge.priority-medium {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .badge.priority-low {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .badge.status-pending {
            background: rgba(8, 150, 238, 0.2);
            color: #0896ee;
        }

        .badge.status-completed {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }

        .action-btn {
            background: #2a3a4a;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #ccc;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #3a4a5a;
        }

        .action-btn.delete {
            color: #e74c3c;
        }

        .action-btn.delete:hover {
            background: rgba(231, 76, 60, 0.2);
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #999;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #ccc;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background-color: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .alert.success {
            background-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        @media (max-width: 768px) {
            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-actions {
                margin-left: 0;
                margin-top: 10px;
                width: 100%;
            }

            .action-btn {
                flex: 1;
            }

            .filters {
                flex-direction: column;
            }

            .header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>TaskKeeper</h1>
        <div class="nav-links">
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h2>My Tasks</h2>
            <a href="create-task.html" class="create-btn">+ Create Task</a>
        </div>

        <div id="alert" class="alert"></div>

        <div class="filters">
            <div class="filter-group">
                <label for="priorityFilter">Priority:</label>
                <select id="priorityFilter" onchange="filterTasks()">
                    <option value="">All</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="statusFilter">Status:</label>
                <select id="statusFilter" onchange="filterTasks()">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
        </div>

        <div id="tasksContainer" class="tasks-container">
            <div class="empty-state">
                <h3>Loading tasks...</h3>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let allTasks = [];

        // Check if user is logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
            } else {
                loadTasks();
            }
        });

        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/api/tasks`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    },
                });

                if (response.ok) {
                    const data = await response.json();
                    allTasks = data.tasks || [];
                    renderTasks(allTasks);
                } else if (response.status === 401) {
                    window.location.href = 'login.html';
                } else {
                    showAlert('Failed to load tasks', 'error');
                }
            } catch (error) {
                showAlert('An error occurred while loading tasks', 'error');
                console.error('Error:', error);
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksContainer');

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No tasks yet</h3>
                        <p>Create your first task to get started</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-title">${escapeHtml(task.task_name)}</div>
                        ${task.task_description ? `<div class="task-description">${escapeHtml(task.task_description)}</div>` : ''}
                        <div class="task-meta">
                            ${task.deadline ? `<span>📅 ${new Date(task.deadline).toLocaleDateString()}</span>` : ''}
                            <span class="badge status-${task.status || 'pending'}">${task.status ? task.status.charAt(0).toUpperCase() + task.status.slice(1) : 'Pending'}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn" onclick="toggleTask(${task.id}, '${task.status || 'pending'}', '${escapeHtml(task.task_name)}', '${escapeHtml(task.task_description || '')}', '${task.deadline || ''}')">
                            ${task.status === 'completed' ? '↩ Undo' : '✓ Complete'}
                        </button>
                        <button class="action-btn delete" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function filterTasks() {
            const priorityFilter = document.getElementById('priorityFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            const filtered = allTasks.filter(task => {
                const priorityMatch = !priorityFilter || task.priority === priorityFilter;
                const statusMatch = !statusFilter || task.status === statusFilter;
                return priorityMatch && statusMatch;
            });

            renderTasks(filtered);
        }

        async function toggleTask(taskId, currentStatus, taskName, taskDescription, deadline) {
            try {
                const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
                
                const response = await fetch(`${API_BASE}/api/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    },
                    body: JSON.stringify({ taskName, taskDescription, deadline, status: newStatus }),
                });

                if (response.ok) {
                    loadTasks();
                } else {
                    showAlert('Failed to update task', 'error');
                }
            } catch (error) {
                showAlert('An error occurred', 'error');
                console.error('Error:', error);
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/tasks/${taskId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    },
                });

                if (response.ok) {
                    showAlert('Task deleted successfully', 'success');
                    loadTasks();
                } else {
                    showAlert('Failed to delete task', 'error');
                }
            } catch (error) {
                showAlert('An error occurred', 'error');
                console.error('Error:', error);
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
