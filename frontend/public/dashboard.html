<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskKeeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%);
            color: #fff;
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(26, 35, 50, 0.8);
            border-bottom: 1px solid #2a3a4a;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 24px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a, .logout-btn {
            color: white;
            text-decoration: none;
            font-weight: 500;
            background: rgba(8, 150, 238, 0.2);
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .nav-links a:hover, .logout-btn:hover {
            background: rgba(8, 150, 238, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h2 {
            font-size: 28px;
            color: #fff;
        }

        .create-btn {
            background-color: #0896ee;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .create-btn:hover {
            background-color: #0682d6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(8, 150, 238, 0.3);
        }

        .filters {
            background-color: rgba(26, 35, 50, 0.8);
            border: 1px solid #2a3a4a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 500;
            color: #ccc;
        }

        .filter-group select {
            padding: 8px 12px;
            border: 1px solid #2a3a4a;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background-color: #1a2332;
            color: #fff;
        }

        .tasks-container {
            background-color: rgba(26, 35, 50, 0.8);
            border: 1px solid #2a3a4a;
            border-radius: 8px;
        }

        .task-item {
            padding: 20px;
            border-bottom: 1px solid #2a3a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .task-item:hover {
            background: rgba(42, 58, 74, 0.5);
        }

        .task-item:first-child {
            border-radius: 8px 8px 0 0;
        }

        .task-item:last-child {
            border-bottom: none;
            border-radius: 0 0 8px 8px;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #fff;
        }

        .task-description {
            color: #999;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #999;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
        }

        .badge.priority-high {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .badge.priority-medium {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .badge.priority-low {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .badge.status-pending {
            background: rgba(8, 150, 238, 0.2);
            color: #0896ee;
        }

        .badge.status-completed {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .task-actions {
            position: relative;
            margin-left: 20px;
        }

        .kebab-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 22px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            transition: background 0.3s;
            letter-spacing: 2px;
            line-height: 1;
        }

        .kebab-btn:hover {
            background: #2a3a4a;
        }

        .dropdown-menu {
            display: none;
            position: fixed;
            background: #1e2d3d;
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            min-width: 150px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 1000;
            overflow: hidden;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: none;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background: #2a3a4a;
        }

        .dropdown-item.delete {
            color: #e74c3c;
        }

        .dropdown-item.delete:hover {
            background: rgba(231, 76, 60, 0.15);
        }

        /* Edit Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #1a2332;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal .form-group {
            margin-bottom: 16px;
        }

        .modal label {
            display: block;
            margin-bottom: 6px;
            color: #ccc;
            font-weight: 500;
        }

        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 10px;
            border: 1px solid #2a3a4a;
            border-radius: 4px;
            background: #0f1419;
            color: #fff;
            font-size: 14px;
        }

        .modal textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-btns button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .modal-btn-cancel {
            background: #2a3a4a;
            color: #ccc;
        }

        .modal-btn-cancel:hover {
            background: #3a4a5a;
        }

        .modal-btn-save {
            background: #0896ee;
            color: #fff;
        }

        .modal-btn-save:hover {
            background: #0682d6;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #999;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #ccc;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background-color: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .alert.success {
            background-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        @media (max-width: 768px) {
            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-actions {
                margin-left: 0;
                margin-top: 10px;
                align-self: flex-end;
            }

            .filters {
                flex-direction: column;
            }

            .header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>TaskKeeper</h1>
        <div class="nav-links">
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h2 id="welcomeHeader">Welcome</h2>
            <a href="create-task.html" class="create-btn">+ Create Task</a>
        </div>

        <div id="alert" class="alert"></div>

        <div class="filters">
            <div class="filter-group">
                <label for="priorityFilter">Priority:</label>
                <select id="priorityFilter" onchange="filterTasks()">
                    <option value="">All</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="statusFilter">Status:</label>
                <select id="statusFilter" onchange="filterTasks()">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
        </div>

        <div id="tasksContainer" class="tasks-container">
            <div class="empty-state">
                <h3>Loading tasks...</h3>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3>Edit Task</h3>
            <input type="hidden" id="editTaskId">
            <div class="form-group">
                <label for="editTaskName">Task Name</label>
                <input type="text" id="editTaskName" required>
            </div>
            <div class="form-group">
                <label for="editTaskDescription">Description</label>
                <textarea id="editTaskDescription"></textarea>
            </div>
            <div class="form-group">
                <label for="editTaskDeadline">Deadline</label>
                <input type="date" id="editTaskDeadline">
            </div>
            <div class="form-group">
                <label for="editTaskStatus">Status</label>
                <select id="editTaskStatus">
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editTaskPriority">Priority</label>
                <select id="editTaskPriority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="modal-btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="modal-btn-save" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let allTasks = [];

        // Decode JWT to get username
        function getUsername() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.username;
            } catch (e) {
                return null;
            }
        }

        // Check if user is logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
            } else {
                const username = getUsername();
                document.getElementById('welcomeHeader').textContent = username ? `Welcome, ${username}` : 'Welcome';
                loadTasks();
            }
        });

        // Close dropdown when clicking elsewhere
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.task-actions')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            }
        });

        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/api/tasks`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    },
                });

                if (response.ok) {
                    const data = await response.json();
                    allTasks = data.tasks || [];
                    renderTasks(allTasks);
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                } else {
                    console.error('Failed to load tasks, status:', response.status);
                    showAlert('Failed to load tasks', 'error');
                }
            } catch (error) {
                showAlert('Could not connect to server', 'error');
                console.error('Error:', error);
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksContainer');

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No tasks yet</h3>
                        <p>Create your first task to get started</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-title">${escapeHtml(task.task_name)}</div>
                        ${task.task_description ? `<div class="task-description">${escapeHtml(task.task_description)}</div>` : ''}
                        <div class="task-meta">
                            ${task.deadline ? `<span>📅 ${new Date(task.deadline).toLocaleDateString()}</span>` : ''}
                            <span class="badge priority-${task.priority || 'medium'}">${task.priority ? task.priority.charAt(0).toUpperCase() + task.priority.slice(1) : 'Medium'}</span>
                            <span class="badge status-${task.status || 'pending'}">${task.status ? task.status.charAt(0).toUpperCase() + task.status.slice(1) : 'Pending'}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="kebab-btn" onclick="toggleMenu(event, ${task.id})" title="Actions">⋮</button>
                        <div class="dropdown-menu" id="menu-${task.id}">
                            <button class="dropdown-item" onclick="openEditModal(${task.id}, '${escapeAttr(task.task_name)}', '${escapeAttr(task.task_description || '')}', '${task.deadline || ''}', '${task.status || 'pending'}', '${task.priority || 'medium'}')">
                                ✏️ Edit
                            </button>
                            <button class="dropdown-item" onclick="toggleTask(${task.id}, '${task.status || 'pending'}', '${escapeAttr(task.task_name)}', '${escapeAttr(task.task_description || '')}', '${task.deadline || ''}', '${task.priority || 'medium'}')">
                                ${task.status === 'completed' ? '↩️ Undo' : '✅ Complete'}
                            </button>
                            <button class="dropdown-item delete" onclick="deleteTask(${task.id})">
                                🗑️ Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterTasks() {
            const priorityFilter = document.getElementById('priorityFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            const filtered = allTasks.filter(task => {
                const priorityMatch = !priorityFilter || task.priority === priorityFilter;
                const statusMatch = !statusFilter || task.status === statusFilter;
                return priorityMatch && statusMatch;
            });

            renderTasks(filtered);
        }

        async function toggleTask(taskId, currentStatus, taskName, taskDescription, deadline, priority) {
            try {
                const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
                
                const response = await fetch(`${API_BASE}/api/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    },
                    body: JSON.stringify({ taskName, taskDescription, deadline, status: newStatus, priority }),
                });

                if (response.ok) {
                    loadTasks();
                } else {
                    showAlert('Failed to update task', 'error');
                }
            } catch (error) {
                showAlert('An error occurred', 'error');
                console.error('Error:', error);
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/tasks/${taskId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    },
                });

                if (response.ok) {
                    showAlert('Task deleted successfully', 'success');
                    loadTasks();
                } else {
                    showAlert('Failed to delete task', 'error');
                }
            } catch (error) {
                showAlert('An error occurred', 'error');
                console.error('Error:', error);
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return String(text).replace(/&/g,'&amp;').replace(/'/g,'\'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function toggleMenu(event, taskId) {
            event.stopPropagation();
            const menu = document.getElementById(`menu-${taskId}`);
            document.querySelectorAll('.dropdown-menu').forEach(m => {
                if (m.id !== `menu-${taskId}`) m.classList.remove('show');
            });
            menu.classList.toggle('show');

            if (menu.classList.contains('show')) {
                const btn = event.currentTarget;
                const rect = btn.getBoundingClientRect();
                const menuHeight = menu.scrollHeight;
                const spaceBelow = window.innerHeight - rect.bottom;

                if (spaceBelow < menuHeight + 8) {
                    menu.style.top = `${rect.top - menuHeight - 4}px`;
                } else {
                    menu.style.top = `${rect.bottom + 4}px`;
                }
                menu.style.left = `${rect.right - menu.offsetWidth}px`;
            }
        }

        function openEditModal(taskId, name, description, deadline, status, priority) {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.getElementById('editTaskId').value = taskId;
            document.getElementById('editTaskName').value = name;
            document.getElementById('editTaskDescription').value = description;
            document.getElementById('editTaskDeadline').value = deadline ? deadline.split('T')[0] : '';
            document.getElementById('editTaskStatus').value = status;
            document.getElementById('editTaskPriority').value = priority || 'medium';
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        async function saveEdit() {
            const taskId = document.getElementById('editTaskId').value;
            const taskName = document.getElementById('editTaskName').value;
            const taskDescription = document.getElementById('editTaskDescription').value;
            const deadline = document.getElementById('editTaskDeadline').value;
            const status = document.getElementById('editTaskStatus').value;
            const priority = document.getElementById('editTaskPriority').value;

            if (!taskName) {
                alert('Task name is required');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    },
                    body: JSON.stringify({ taskName, taskDescription, deadline, status, priority }),
                });

                if (response.ok) {
                    closeEditModal();
                    showAlert('Task updated successfully', 'success');
                    loadTasks();
                } else {
                    showAlert('Failed to update task', 'error');
                }
            } catch (error) {
                showAlert('An error occurred', 'error');
                console.error('Error:', error);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
